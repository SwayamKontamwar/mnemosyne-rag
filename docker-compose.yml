services:
  mnemosyne:
    build: .
    ports:
      - "${MNEMO_PORT:-8765}:8765"
    environment:
      MNEMO_HOME: /data
      MNEMO_EMBED_PROVIDER: ollama
      MNEMO_VECTOR_PROVIDER: chroma
      OLLAMA_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_MODEL: qwen2.5:3b
    volumes:
      - mnemosyne-data:/data
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama-models:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull nomic-embed-text && ollama pull qwen2.5:3b"]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
  mnemosyne-data:
