services:
  mnemosyne:
    build: .
    ports:
      - "8765:8765"
    environment:
      MNEMO_HOME: /data
      MNEMO_EMBED_PROVIDER: ollama
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_MODEL: qwen2.5:7b
    volumes:
      - ./data:/data
